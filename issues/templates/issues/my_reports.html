<!DOCTYPE html>
<html>
<head>
    <title>My Reports</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        .header {
            background: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
        }

        .status-step {
            flex: 1;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
        }

        /* ✅ Improved Status Visibility */
        .reported.active {
            background: #fff3cd;
            color: #856404;
            font-weight: bold;
        }

        .progress.active {
            background: #cce5ff;
            color: #004085;
            font-weight: bold;
        }

        .resolved.active {
            background: #d4edda;
            color: #155724;
            font-weight: bold;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #ddd;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav a {
            text-decoration: none;
            color: black;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="header">My Reports</div>

<div class="container">

{% for issue in issues %}
    <div class="card">

        <p><strong>📍 Location:</strong> {{ issue.latitude }}, {{ issue.longitude }}</p>
        <p><strong>📅 Date:</strong> {{ issue.created_at }}</p>
        <p><strong>Type:</strong> {{ issue.get_issue_type_display }}</p>

        <!-- ✅ Improved STATUS BAR -->
        <div class="status-bar">
            <div class="status-step reported {% if issue.status == 'reported' %}active{% endif %}">
                🟡 Reported
            </div>
            <div class="status-step progress {% if issue.status == 'in_progress' %}active{% endif %}">
                🔵 In Progress
            </div>
            <div class="status-step resolved {% if issue.status == 'resolved' %}active{% endif %}">
                🟢 Resolved
            </div>
        </div>

        <!-- ✅ Feedback added -->
        <button onclick="followUpAlert()">💬 Follow Up</button>

    </div>
{% empty %}
    <p>No reports yet.</p>
{% endfor %}

</div>

<!-- Bottom Navigation -->
<div class="nav">
    <a href="/">Home</a>
    <a href="/">Report</a>
    <a href="/my-reports/">Track</a>
    <a href="#">Profile</a>
</div>

<!-- ✅ Feedback Script -->
<script>
function followUpAlert() {
    alert("Opening report details...");
}
</script>

</body>
</html>
